version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ulica-db
    environment:
      POSTGRES_DB: ulica
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: ulica-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ulica
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: pass

  scraper:
    build:
      context: ./scraper
    container_name: ulica-scraper
    depends_on:
      - db
      - backend

volumes:
  pgdata:
